<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form action="">
    <h2>
        注册信息
    </h2>
    <h3>
        个人信息
    </h3>
    姓名：<input type="text" placeholder="请输入文本">
    <br>
    密码：<input type="password" placeholder="请输入密码">
    <br>
    确认密码：<input type="password"  placeholder="确认密码">
    <br>
    性别：<input type="radio" name="xingbie" id="nanniang" checked><label for="nanniang">男娘</label>
    <label><input type="radio" name="xingbie" id="">女</label>
    <br>
    居住城市：<select>
        <option selected>重庆</option>
        <option>上海</option>
        <option>深圳</option>
    </select>
    <h3>
        教育经历
    </h3>
    最高学历：<select>
        <option>大专</option>
        <option selected>本科</option>
        <option>研究生</option>
    </select>
    <br>
    学校名称：<input type="text" placeholder="学校名">
    <br>
    所学专业：<input type="text" placeholder="专业名">
    <br>
    在校时间：<select>
        <option>2015</option>
        <option selected>2016</option>
        <option>2017</option>
    </select>--<select>
        <option>2019</option>
        <option selected>2020</option>
        <option>2021</option>
    </select>
    <h3>
        工作经历
    </h3>
    公司名称<input type="text"  placeholder="公司名">
    <br>
    工作描述
    <br>
    <input type="text">
    <br><br>
    <input type="checkbox">已阅读并同意以下条款
    <ul>
        <li><a href="#">《用户服务协议》</a></li>
        <li><a href="#">《隐私政策》</a></li>
    </ul>
    <br><br><br>
    <button>注册</button>
    <button type="reset">重置信息</button>

    </form>
</body>
</html>
